{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RentEase – Forgot Password</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <style>
      :root {
        --primary: #2563eb;
      }

      body {
        font-family: "Inter", sans-serif;
        min-height: 100vh;
      }

      .desktop-view {
        background: linear-gradient(to bottom, #ffffff, #f8fafc);
        min-height: 100vh;
        display: flex;
        align-items: center;
      }

      .auth-card {
        border: none;
        border-radius: 18px;
        box-shadow: 0 30px 60px rgba(0, 0, 0, 0.08);
        overflow: hidden;
      }

      .brand-section {
        background: var(--primary);
        color: #fff;
        padding: 40px;
      }

      .brand-icon {
        width: 45px;
        height: 45px;
        background: #fff;
        color: var(--primary);
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        margin-bottom: 20px;
      }

      .form-section {
        padding: 40px;
      }

      .form-control {
        border-radius: 12px;
        padding: 12px;
      }

      .btn-primary {
        background: var(--primary);
        border: none;
        border-radius: 12px;
        padding: 12px;
        font-weight: 600;
      }
    </style>
  </head>

  <body>
    <div class="desktop-view container">
      <div class="row justify-content-center w-100">
        <div class="col-lg-8 col-md-10 col-12">
          <div class="card auth-card">
            <div class="row g-0">
              <!-- LEFT BRAND -->
              <div
                class="col-md-5 brand-section d-flex flex-column justify-content-center"
              >
                <div class="brand-icon"><i class="bi bi-key"></i></div>
                <h4 class="fw-bold">Reset Access</h4>
                <p class="mt-3 small">
                  Enter your registered email to reset your account details.
                </p>
              </div>

              <!-- RIGHT FORM -->
              <div class="col-md-7 form-section">
                <h4 class="fw-bold mb-4">Forgot Password</h4>

                {% if messages %} {% for message in messages %}
                <div class="alert alert-danger">{{ message }}</div>
                {% endfor %} {% endif %}

                <form method="POST" action="{% url 'forgot_password' %}">
                  {% csrf_token %}

                  <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input
                      type="email"
                      name="email"
                      class="form-control"
                      placeholder="Enter your email"
                      required
                    />
                  </div>

                  <button class="btn btn-primary w-100">Continue</button>
                </form>

                <div class="mt-3 text-center">
                  <a href="{% url 'login' %}">Back to Login</a>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
